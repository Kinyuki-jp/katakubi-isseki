<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>肩首一席 | Instagram DM予約</title>
    <meta
      name="description"
      content="近畿大学ベースキャンプ周辺のボディケア。予約はInstagram DMで希望時間を送ってください。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260626-shoji1" />
  </head>
  <body>
    <div class="opening" aria-hidden="true">
      <div class="door door-left"></div>
      <div class="door door-right"></div>
      <div class="opening-copy">
        <p>肩首一席</p>
        <strong>マッサージします。</strong>
      </div>
      <div class="story-stage">
        <p class="story-line" aria-label="10年間修行してきた">
          <span style="--i: 0">1</span>
          <span style="--i: 1">0</span>
          <span style="--i: 2">年</span>
          <span style="--i: 3">間</span>
          <span style="--i: 4">修</span>
          <span style="--i: 5">行</span>
          <span style="--i: 6">し</span>
          <span style="--i: 7">て</span>
          <span style="--i: 8">き</span>
          <span style="--i: 9">た</span>
        </p>
      </div>
    </div>

    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-bg" role="img" aria-label="施術前の静かな空気を感じる背景"></div>
        <div class="hero-shade"></div>

        <div class="hero-content">
          <p class="eyebrow">Kindai Basecamp / Instagram DM</p>
          <h1 id="hero-title">マッサージします。</h1>
          <p class="lead">
            予約はInstagramのDMへ。希望する日付と時間を、そのまま送ってください。
          </p>

          <div class="reservation-card" aria-label="予約案内">
            <div>
              <span class="label">Course</span>
              <strong>お任せコース</strong>
            </div>
            <div>
              <span class="label">Price</span>
              <strong>1,500円</strong>
            </div>
            <div>
              <span class="label">Time</span>
              <strong>18:00 - 24:00</strong>
            </div>
          </div>

          <div class="dm-box">
            <p class="dm-title">DMで送る内容</p>
            <p>「今日の21時からお願いします」</p>
            <p>「明日、22時半くらい空いてますか？」</p>
            <p class="dm-note">友達にLINEを送るくらい軽くて大丈夫です。希望の時間を送るだけで予約相談できます。18時から24時、夜遅め優先です。</p>
          </div>

          <div class="actions">
            <a
              class="button button-primary"
              href="https://www.instagram.com/kinyukinomati2/"
              target="_blank"
              rel="noopener"
            >
              <i data-lucide="instagram" aria-hidden="true"></i>
              Instagram DMへ
            </a>
          </div>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./script.js?v=20260626-shoji1"></script>
  </body>
</html>
