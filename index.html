<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>肩首一席 | Instagram DM予約</title>
    <meta
      name="description"
      content="近畿大学ベースキャンプ周辺のボディケア。予約はInstagram DMで希望時間を送るだけ。30分1,500円。"
    />
    <meta name="theme-color" content="#2c211a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@700;900&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260630-humanfinish1" />
  </head>
  <body>
    <div class="opening" aria-hidden="true">
      <div class="door door-left"></div>
      <div class="door door-right"></div>
      <div class="opening-copy">
        <p>肩首一席</p>
        <strong>
          <span class="title-line">マッサージ</span>
          <span class="title-line">します。</span>
        </strong>
      </div>
      <div class="slash-effect slash-one"></div>
      <div class="slash-effect slash-two"></div>
      <div class="slash-effect slash-three"></div>
      <div class="story-stage">
        <div class="summit-scene" aria-label="10年間、肩と首を見てきた。積み重ねた手技で、今夜ほぐします">
          <div class="summit-art"></div>
          <div class="summit-mist summit-mist-left"></div>
          <div class="summit-mist summit-mist-right"></div>
          <p class="cloud-message">10年間、肩と首を見てきた</p>
          <p class="summit-message">
            積み重ねた手技で<br />
            今夜ほぐします
          </p>
        </div>
      </div>
    </div>

    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-bg" role="img" aria-label="施術前の静かな空気を感じる背景"></div>
        <div class="hero-shade"></div>

        <div class="hero-content">
          <p class="eyebrow">近大ベースキャンプ近く / Instagram DM</p>
          <h1 id="hero-title">
            <span class="title-line">マッサージ</span>
            <span class="title-line">します。</span>
          </h1>
          <p class="lead">
            まずは希望時間だけDMで送ってください。空いていれば、そのまま調整します。
          </p>

          <div class="reservation-card" aria-label="予約案内">
            <div>
              <span class="label">コース</span>
              <strong>お任せコース</strong>
            </div>
            <div>
              <span class="label">料金</span>
              <strong>30分 1,500円</strong>
            </div>
          </div>

          <div class="dm-box">
            <p class="dm-title">DMはこれくらいで大丈夫</p>
            <p>「今日の21時からお願いします」</p>
            <p>「明日、22時半くらい空いてますか？」</p>
            <p class="dm-note">友達にLINEする感じで大丈夫です。18時から24時、夜遅めだと合わせやすいです。</p>
          </div>

          <div class="actions">
            <a
              class="button button-primary"
              href="https://www.instagram.com/kinyukinomati2/"
              target="_blank"
              rel="noopener"
            >
              <i data-lucide="send" aria-hidden="true"></i>
              Instagramで相談
            </a>
          </div>
        </div>
      </section>
    </main>

    <a
      class="mobile-sticky-cta"
      href="https://www.instagram.com/kinyukinomati2/"
      target="_blank"
      rel="noopener"
      aria-label="InstagramのDMで相談する"
    >
      <i data-lucide="send" aria-hidden="true"></i>
      <span>Instagramで相談</span>
    </a>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./script.js?v=20260630-humanfinish1"></script>
  </body>
</html>
