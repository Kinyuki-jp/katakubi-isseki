    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@700;900&display=swap"

  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-bg" role="img" aria-label="施術前の静かな空気を感じる背景"></div>
        <div class="hero-shade"></div>

        <div class="hero-content">
          <p class="eyebrow">Kindai Basecamp / Instagram DM</p>
          <h1 id="hero-title">この時間に<br />マッサージしてほしい。</h1>
          <p class="lead">
            予約はInstagramのDMで受け付けています。希望する日付と時間を、そのまま送ってください。
          </p>

          <div class="reservation-card" aria-label="予約案内">
            <div>
              <span class="label">Course</span>
              <strong>お任せコース</strong>
            </div>
            <div>
              <span class="label">Price</span>
              <strong>1,500円</strong>
            </div>
            <div>
              <span class="label">Time</span>
              <strong>18:00 - 24:00</strong>
            </div>
          </div>

          <div class="dm-box">
            <p class="dm-title">DMで送る内容</p>
            <p>希望時間：◯月◯日 ◯時ごろ</p>
            <p>気になるところ：肩 / 首 / お任せ</p>
            <p class="dm-note">迷ったら、18時から24時の間で候補を送ってください。夜遅めの時間帯を優先しています。</p>
          </div>

          <div class="actions">
            <a
              class="button button-primary"
              href="https://www.instagram.com/kinyukinomati2/"
              target="_blank"
              rel="noopener"
            >
              <i data-lucide="instagram" aria-hidden="true"></i>
              Instagram DMへ
            </a>
          </div>
        </div>
      </section>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
