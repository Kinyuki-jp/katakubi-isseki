<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>肩首一席 | QRポスター</title>
    <style>
      @page {
        size: A4;
        margin: 0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        color: #17130f;
        background: #2a241d;
        font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
        letter-spacing: 0;
      }

      .poster {
        position: relative;
        width: min(100vw, calc(100svh * 210 / 297));
        aspect-ratio: 210 / 297;
        overflow: hidden;
        padding: 7.6% 7.2%;
        background:
          radial-gradient(circle at 22% 18%, rgba(199, 154, 75, 0.18), transparent 12%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.96), rgba(250, 248, 240, 0.98)),
          repeating-linear-gradient(12deg, rgba(23, 19, 15, 0.026) 0 1px, transparent 1px 13px),
          repeating-linear-gradient(96deg, rgba(23, 19, 15, 0.018) 0 1px, transparent 1px 17px);
      }

      .poster::before,
      .poster::after {
        position: absolute;
        content: "";
        pointer-events: none;
      }

      .poster::before {
        inset: 4.2%;
        border: 2px solid rgba(23, 19, 15, 0.82);
        box-shadow: inset 0 0 0 7px rgba(199, 154, 75, 0.36);
      }

      .poster::after {
        right: 7%;
        top: 8%;
        width: 33%;
        height: 1.6%;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, rgba(23, 19, 15, 0.42), transparent);
        transform: rotate(-11deg);
        opacity: 0.45;
        filter: blur(1px);
      }

      .content {
        position: relative;
        z-index: 1;
        display: grid;
        height: 100%;
        grid-template-rows: auto auto 1fr auto;
        gap: 4.6%;
      }

      .eyebrow {
        margin: 0;
        color: #8f241c;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
        font-size: clamp(13px, 1.15vw, 28px);
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 6.7vw, 164px);
        font-weight: 900;
        line-height: 0.96;
      }

      .sub {
        margin: 2.2% 0 0;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
        font-size: clamp(17px, 1.55vw, 40px);
        font-weight: 900;
      }

      .details {
        align-self: start;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border-top: 2px solid rgba(23, 19, 15, 0.82);
        border-bottom: 2px solid rgba(23, 19, 15, 0.82);
      }

      .detail {
        min-height: clamp(76px, 9vw, 214px);
        padding: 6.4% 8%;
        border-right: 2px solid rgba(23, 19, 15, 0.82);
      }

      .detail:last-child {
        border-right: 0;
      }

      .label {
        display: block;
        color: #8f241c;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
        font-size: clamp(12px, 1vw, 25px);
        font-weight: 900;
      }

      .value {
        display: block;
        margin-top: 7%;
        font-size: clamp(19px, 2.1vw, 52px);
        font-weight: 900;
        line-height: 1.16;
      }

      .qr-area {
        align-self: end;
        display: grid;
        grid-template-columns: 1fr 42%;
        gap: 6%;
        align-items: end;
      }

      .copy {
        padding-bottom: 2.5%;
      }

      .copy strong {
        display: block;
        margin-bottom: 4%;
        font-size: clamp(31px, 4vw, 98px);
        line-height: 1.05;
      }

      .copy p {
        margin: 0 0 3%;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
        font-size: clamp(15px, 1.45vw, 36px);
        font-weight: 900;
        line-height: 1.45;
      }

      .url {
        color: rgba(23, 19, 15, 0.68);
        word-break: break-all;
      }

      .qr {
        display: grid;
        gap: 4%;
        justify-items: center;
      }

      .qr img {
        width: 100%;
        aspect-ratio: 1;
        border: clamp(8px, 0.9vw, 22px) solid #fff;
        background: #fff;
        box-shadow: 0 18px 48px rgba(23, 19, 15, 0.22);
      }

      .qr span {
        width: 100%;
        padding: 3.6% 2%;
        color: #fffaf1;
        background: #17130f;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
        font-size: clamp(14px, 1.35vw, 34px);
        font-weight: 900;
        text-align: center;
      }

      @media (max-width: 760px) {
        .details {
          grid-template-columns: 1fr;
        }

        .detail {
          min-height: auto;
          padding: 3.5% 4.5%;
          border-right: 0;
          border-bottom: 1px solid rgba(23, 19, 15, 0.82);
        }

        .detail:last-child {
          border-bottom: 0;
        }

        .qr-area {
          grid-template-columns: 1fr;
          gap: 4%;
        }

        .qr img {
          width: 58%;
        }
      }

      @media print {
        body {
          min-height: auto;
          background: #fff;
        }

        .poster {
          width: 210mm;
          height: 297mm;
        }
      }
    </style>
  </head>
  <body>
    <main class="poster" aria-label="肩首一席 QRポスター">
      <div class="content">
        <header>
          <p class="eyebrow">Kindai Basecamp / Instagram DM</p>
          <h1>マッサージします。</h1>
          <p class="sub">希望時間をDMで送るだけ。</p>
        </header>

        <section class="details" aria-label="案内">
          <div class="detail">
            <span class="label">Course</span>
            <span class="value">お任せ</span>
          </div>
          <div class="detail">
            <span class="label">Price</span>
            <span class="value">1,500円</span>
          </div>
          <div class="detail">
            <span class="label">Time</span>
            <span class="value">18:00 - 24:00</span>
          </div>
        </section>

        <div></div>

        <section class="qr-area" aria-label="QRコード">
          <div class="copy">
            <strong>QRから<br />Instagram DMへ</strong>
            <p>「今日21時からお願いします」くらいで大丈夫です。</p>
            <p class="url">https://kinyuki-jp.github.io/katakubi-isseki/</p>
          </div>
          <div class="qr">
            <img src="./qr-katakubi-isseki.svg" alt="肩首一席の公開ページQRコード" />
            <span>予約相談はこちら</span>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
